<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  .stage { align-items: stretch; }
  .rows { width: 100%; display: flex; flex-direction: column; gap: 16px; }
  .role { display: flex; align-items: baseline; gap: 18px; border-bottom: 1px solid var(--stroke-2); padding-bottom: 14px; }
  .role:last-child { border-bottom: none; padding-bottom: 0; }
  .specimen { flex: 1; }
  .tag { width: 120px; font-size: 10px; font-family: var(--font-mono); color: var(--fg-3); flex: none; }
</style>
</head>
<body>
<div class="stage">
  <div class="rows">
    <div class="role">
      <span class="tag">.tooltip · 12/500</span>
      <span class="specimen acetato-tooltip">Lápiz · trazo a mano alzada</span>
    </div>
    <div class="role">
      <span class="tag">.label · 11/500</span>
      <span class="specimen acetato-label">Grosor medio</span>
    </div>
    <div class="role">
      <span class="tag">.caption · 10/600</span>
      <span class="specimen acetato-caption">Tinta</span>
    </div>
    <div class="role">
      <span class="tag">.kbd · 11 mono</span>
      <span class="specimen acetato-kbd">Ctrl + Z · P · E · Esc</span>
    </div>
  </div>
</div>
</body>
</html>
