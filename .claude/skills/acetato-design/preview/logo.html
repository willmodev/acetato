<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  .stage { justify-content: center; gap: 56px; }
  .lockup { display: flex; align-items: center; gap: 14px; }
  /* mark: two offset rounded "acetate" panes — overlay metaphor */
  .mark { position: relative; width: 40px; height: 40px; }
  .pane { position: absolute; width: 28px; height: 28px; border-radius: 9px; border: 2px solid; }
  .pane--back { right: 0; top: 0; border-color: var(--fg-2); background: rgba(255,255,255,0.04); }
  .pane--front { left: 0; bottom: 0; border-color: var(--accent); background: var(--accent-fill);
                 -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px); }
  .word { font-family: "Public Sans", var(--font-ui); font-weight: 600; font-size: 30px;
          color: var(--fg-1); letter-spacing: -0.01em; }
  .word b { color: var(--accent); font-weight: 600; }
  .markonly { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .tag { font-size: 10px; font-family: var(--font-mono); color: var(--fg-3); }
</style>
</head>
<body>
<div class="stage">
  <div class="lockup">
    <div class="mark"><span class="pane pane--back"></span><span class="pane pane--front"></span></div>
    <span class="word">acetato</span>
  </div>
  <div class="markonly">
    <div class="mark"><span class="pane pane--back"></span><span class="pane pane--front"></span></div>
    <span class="tag">isotipo · capas superpuestas</span>
  </div>
</div>
</body>
</html>
