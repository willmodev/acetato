<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
<style>
  .stage { gap: 12px; justify-content: center; }
  .sw { width: 150px; display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 80px; border-radius: 10px; border: 1px solid var(--stroke-1); display: grid; place-items: center; }
  .meta .n { font-size: 11px; font-weight: 600; color: var(--fg-1); }
  .meta .v { font-size: 10px; color: var(--fg-3); font-family: var(--font-mono); }
  .meta .r { font-size: 10px; color: var(--fg-2); margin-top: 2px; }
  .dot { width: 28px; height: 28px; border-radius: 50%; }
</style>
</head>
<body>
<div class="stage">
  <div class="sw">
    <div class="chip" style="background:var(--accent)"></div>
    <div class="meta"><span class="n">accent</span><span class="v">#2FD9C4</span><span class="r">Herramienta activa</span></div>
  </div>
  <div class="sw">
    <div class="chip" style="background:var(--accent-quiet)"></div>
    <div class="meta"><span class="n">accent-quiet</span><span class="v">#1FA899</span><span class="r">Pressed · bordes</span></div>
  </div>
  <div class="sw">
    <div class="chip" style="background:#16181C"><span class="dot" style="background:var(--accent-fill)"></span></div>
    <div class="meta"><span class="n">accent-fill</span><span class="v">teal 16%</span><span class="r">Fondo activo</span></div>
  </div>
  <div class="sw">
    <div class="chip" style="background:#16181C; box-shadow: inset 0 0 0 1px var(--accent-ring), inset 0 0 18px var(--accent-glow)"></div>
    <div class="meta"><span class="n">accent-ring / glow</span><span class="v">teal 45% / 30%</span><span class="r">Foco · resplandor</span></div>
  </div>
</div>
</body>
</html>
