<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
<link rel="stylesheet" href="toolbar.css">
<style>
  .stage { justify-content: center; }
  .popover {
    background: var(--chrome-glass-strong);
    -webkit-backdrop-filter: blur(24px) saturate(150%); backdrop-filter: blur(24px) saturate(150%);
    border: 1px solid var(--stroke-1); border-radius: var(--r-popover);
    box-shadow: var(--shadow-pop), var(--shadow-inset);
    padding: 12px; width: 232px; display: flex; flex-direction: column; gap: 4px;
  }
  .caption { font-size: var(--text-section); font-weight: 600; text-transform: uppercase;
             letter-spacing: var(--tracking-caption); color: var(--fg-3); margin-bottom: 4px; }
  .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; min-height: 30px; }
  .label { font-size: 12px; color: var(--fg-1); font-weight: 500; }
  .seg { display: inline-flex; background: var(--chrome-glass-thin); border: 1px solid var(--stroke-2);
         border-radius: 8px; padding: 2px; gap: 2px; }
  .seg b { font-weight: 500; font-size: 11px; padding: 4px 8px; border-radius: 6px; color: var(--fg-2); }
  .seg b.on { background: var(--accent-fill); color: var(--accent); }
  .tg { width: 36px; height: 20px; border-radius: 999px; position: relative; flex: none;
        border: 1px solid var(--stroke-2); background: rgba(255,255,255,0.08); }
  .tg.on { background: var(--accent); border-color: var(--accent); }
  .knob { position: absolute; top: 1px; left: 1px; width: 16px; height: 16px; border-radius: 50%;
          background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.4); }
  .tg.on .knob { left: auto; right: 1px; }
</style>
</head>
<body>
<div class="stage">
  <div class="popover">
    <div class="caption">Ajustes</div>
    <div class="row"><span class="label">Tamaño de la barra</span>
      <span class="seg"><b class="on">Compacta</b><b>Cómoda</b></span></div>
    <div class="row"><span class="label">Suavizar trazo</span><span class="tg on"><span class="knob"></span></span></div>
    <div class="row"><span class="label">Ajustar a bordes</span><span class="tg on"><span class="knob"></span></span></div>
    <div class="row"><span class="label">Mostrar atajos</span><span class="tg"><span class="knob"></span></span></div>
  </div>
</div>
</body>
</html>
