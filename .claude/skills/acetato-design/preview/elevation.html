<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
<style>
  .stage { gap: 28px; justify-content: center; background: #0E0F12; }
  .sw { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .box { width: 120px; height: 60px; background: var(--chrome-glass-strong); border: 1px solid var(--stroke-1);
         border-radius: 12px; -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px); }
  .meta { text-align: center; }
  .meta .n { font-size: 11px; font-weight: 600; color: var(--fg-1); }
  .meta .v { font-size: 10px; color: var(--fg-3); }
</style>
</head>
<body>
<div class="stage">
  <div class="sw"><div class="box" style="box-shadow: var(--shadow-bar), var(--shadow-inset)"></div>
    <div class="meta"><div class="n">shadow-bar</div><div class="v">barra flotante</div></div></div>
  <div class="sw"><div class="box" style="box-shadow: var(--shadow-pop), var(--shadow-inset)"></div>
    <div class="meta"><div class="n">shadow-pop</div><div class="v">popovers · menús</div></div></div>
  <div class="sw"><div class="box" style="box-shadow: var(--shadow-active)"></div>
    <div class="meta"><div class="n">shadow-active</div><div class="v">herramienta activa</div></div></div>
</div>
</body>
</html>
