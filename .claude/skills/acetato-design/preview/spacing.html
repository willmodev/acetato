<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
<style>
  .stage { align-items: stretch; }
  .rows { width: 100%; display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; align-items: center; gap: 14px; }
  .bar { height: 14px; background: var(--accent); border-radius: 3px; }
  .tag { width: 92px; font-size: 11px; color: var(--fg-2); font-family: var(--font-mono); flex: none; }
  .px { font-size: 10px; color: var(--fg-3); font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="stage">
  <div class="rows">
    <div class="row"><span class="tag">--s-1</span><span class="bar" style="width:4px"></span><span class="px">4px</span></div>
    <div class="row"><span class="tag">--s-2</span><span class="bar" style="width:8px"></span><span class="px">8px</span></div>
    <div class="row"><span class="tag">--s-3</span><span class="bar" style="width:12px"></span><span class="px">12px</span></div>
    <div class="row"><span class="tag">--s-4</span><span class="bar" style="width:16px"></span><span class="px">16px</span></div>
    <div class="row"><span class="tag">--s-5</span><span class="bar" style="width:20px"></span><span class="px">20px</span></div>
    <div class="row"><span class="tag">--s-6</span><span class="bar" style="width:24px"></span><span class="px">24px</span></div>
  </div>
</div>
</body>
</html>
