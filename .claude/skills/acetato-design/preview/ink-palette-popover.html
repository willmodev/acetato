<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
<link rel="stylesheet" href="toolbar.css">
<style>
  .stage { justify-content: center; }
  .popover {
    background: var(--chrome-glass-strong);
    -webkit-backdrop-filter: blur(24px) saturate(150%);
    backdrop-filter: blur(24px) saturate(150%);
    border: 1px solid var(--stroke-1);
    border-radius: var(--r-popover);
    box-shadow: var(--shadow-pop), var(--shadow-inset);
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .caption { font-size: var(--text-section); font-weight: 600; text-transform: uppercase;
             letter-spacing: var(--tracking-caption); color: var(--fg-3); }
  .swatches { display: grid; grid-template-columns: repeat(6, 32px); gap: 8px; }
  .ink {
    width: 32px; height: 32px; border-radius: var(--r-swatch);
    cursor: pointer; position: relative;
    box-shadow: 0 1px 4px rgba(0,0,0,0.35);
  }
  .ink--white { box-shadow: inset 0 0 0 1px rgba(0,0,0,0.12), 0 1px 4px rgba(0,0,0,0.35); }
  .ink--black { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18), 0 1px 4px rgba(0,0,0,0.35); }
  /* selected ring */
  .ink--sel { box-shadow: 0 0 0 2px var(--chrome-glass-strong), 0 0 0 4px var(--accent); }
</style>
</head>
<body>
<div class="stage">
  <div class="popover">
    <div class="caption">Tinta</div>
    <div class="swatches">
      <div class="ink ink--sel" style="background:var(--ink-red)"></div>
      <div class="ink" style="background:var(--ink-blue)"></div>
      <div class="ink" style="background:var(--ink-yellow)"></div>
      <div class="ink" style="background:var(--ink-green)"></div>
      <div class="ink ink--white" style="background:var(--ink-white)"></div>
      <div class="ink ink--black" style="background:var(--ink-black)"></div>
    </div>
  </div>
</div>
<script src="https://unpkg.com/lucide@latest"></script>
<script>lucide.createIcons();</script>
</body>
</html>
