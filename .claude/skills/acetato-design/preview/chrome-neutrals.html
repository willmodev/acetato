<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
<style>
  .stage { align-items: stretch; flex-direction: column; gap: 16px; justify-content: center; }
  .group { display: flex; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 64px; border-radius: 10px; border: 1px solid var(--stroke-1); }
  .meta { display: flex; flex-direction: column; gap: 2px; }
  .meta .n { font-size: 11px; font-weight: 600; color: var(--fg-1); }
  .meta .v { font-size: 10px; color: var(--fg-3); font-family: var(--font-mono); }
  /* checker so transparency reads */
  .glass-on-checker { position: relative; overflow: hidden; }
  .glass-on-checker::before {
    content: ""; position: absolute; inset: 0;
    background:
      linear-gradient(45deg, #555 25%, transparent 25%) 0 0/16px 16px,
      linear-gradient(-45deg, #555 25%, transparent 25%) 0 0/16px 16px,
      linear-gradient(45deg, transparent 75%, #555 75%) 0 0/16px 16px,
      linear-gradient(-45deg, transparent 75%, #555 75%) 0 0/16px 16px,
      #888;
  }
  .glass-fill { position: absolute; inset: 0; }
</style>
</head>
<body>
<div class="stage">
  <div class="group">
    <div class="sw"><div class="chip glass-on-checker"><div class="glass-fill" style="background:var(--chrome-glass)"></div></div>
      <div class="meta"><span class="n">glass</span><span class="v">rgba(22,24,28,.72)</span></div></div>
    <div class="sw"><div class="chip glass-on-checker"><div class="glass-fill" style="background:var(--chrome-glass-strong)"></div></div>
      <div class="meta"><span class="n">glass-strong</span><span class="v">rgba(18,20,23,.88)</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--chrome-solid)"></div>
      <div class="meta"><span class="n">solid</span><span class="v">#16181C</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--chrome-solid-2)"></div>
      <div class="meta"><span class="n">solid-2</span><span class="v">#1E2126</span></div></div>
  </div>
  <div class="group">
    <div class="sw"><div class="chip" style="background:#16181C"><div style="height:100%;background:var(--fg-1)"></div></div>
      <div class="meta"><span class="n">fg-1</span><span class="v">white 96%</span></div></div>
    <div class="sw"><div class="chip" style="background:#16181C"><div style="height:100%;background:var(--fg-2)"></div></div>
      <div class="meta"><span class="n">fg-2</span><span class="v">white 62%</span></div></div>
    <div class="sw"><div class="chip" style="background:#16181C"><div style="height:100%;background:var(--fg-3)"></div></div>
      <div class="meta"><span class="n">fg-3</span><span class="v">white 38%</span></div></div>
    <div class="sw"><div class="chip" style="background:#16181C"><div style="height:100%;background:var(--stroke-1)"></div></div>
      <div class="meta"><span class="n">stroke-1</span><span class="v">white 10%</span></div></div>
  </div>
</div>
</body>
</html>
